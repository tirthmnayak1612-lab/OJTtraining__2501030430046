<!DOCTYPE html>
<html>
<head>
    <title>Inline, Internal and External CSS</title>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: green;
            font-size: 35px;
            background-color: lightyellow;
            padding: 10px;
            border: 2px solid black;
        }
    </style>

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: blue; font-size: 40px; background-color: lightgray; padding: 10px;">
        This is Inline CSS
    </h1>

    <!-- Internal CSS -->
    <h2>
        This is Internal CSS
    </h2>

    <!-- External CSS -->
    <p>
        This is External CSS
    </p>

</body>
</html>
