<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Auto-Motive</title>

<!-- Bootstrap -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2183&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D")
    no-repeat center center/cover;
}

.container{
    width:380px;

    background:rgba(0,0,0,0.75);

    padding:40px;

    border-radius:20px;

    text-align:center;

    color:white;

    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.container h1{
    margin-bottom:20px;

    color:orange;

    font-family:'Times New Roman', Times, serif;
}

.input-box{
    width:100%;

    margin-top:20px;

    position:relative;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
}

.input-box input{
    width:100%;

    padding:12px 12px 12px 45px;

    border:none;

    border-radius:8px;

    outline:none;
}

button{
    width:100%;

    padding:12px;

    margin-top:25px;

    border:none;

    border-radius:8px;

    background:crimson;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:orange;
}

.switch{
    margin-top:20px;
}

.switch a{
    color:gold;

    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <h1 id="form-title">
        <i class="bi bi-car-front-fill"></i> Login
    </h1>

    <!-- LOGIN FORM -->
    <div id="login-form">

        <div class="input-box">
            <i class="bi bi-person-fill"></i>
            <input type="text" placeholder="Enter Name">
        </div>

        <div class="input-box">
            <i class="bi bi-lock-fill"></i>
            <input type="password" placeholder="Enter Password">
        </div>

        <button onclick="login()">
            <i class="bi bi-box-arrow-in-right"></i>
            Login
        </button>

        <div class="switch">
            Don't have an account?
            <a href="#" onclick="showRegister()">
                Register
            </a>
        </div>

    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none;">

        <div class="input-box">
            <i class="bi bi-person-badge-fill"></i>
            <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="bi bi-envelope-fill"></i>
            <input type="email" placeholder="Enter Email">
        </div>

        <div class="input-box">
            <i class="bi bi-lock-fill"></i>
            <input type="password" placeholder="Create Password">
        </div>

        <button onclick="register()">
            <i class="bi bi-person-plus-fill"></i>
            Register
        </button>

        <div class="switch">
            Already have an account?
            <a href="#" onclick="showLogin()">
                Login
            </a>
        </div>

    </div>

</div>

<script>

/* Show Register Form */
function showRegister(){

    document.getElementById("login-form").style.display="none";

    document.getElementById("register-form").style.display="block";

    document.getElementById("form-title").innerHTML=
    '<i class="bi bi-person-plus-fill"></i> Register';
}

/* Show Login Form */
function showLogin(){

    document.getElementById("register-form").style.display="none";

    document.getElementById("login-form").style.display="block";

    document.getElementById("form-title").innerHTML=
    '<i class="bi bi-car-front-fill"></i> Login';
}

/* Login */
function login(){

    alert("Login Successful!");

    window.location.href="home.html";
}

/* Register */
function register(){

    alert("Registration Successful!");

    window.location.href="home.html";
}

</script>

</body>
</html>
